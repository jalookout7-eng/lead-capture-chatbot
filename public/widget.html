<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Widget Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex items-center justify-center">

  <!-- Demo background -->
  <div class="text-center">
    <p class="text-gray-400 text-sm mb-2">This widget can be embedded on any website</p>
    <p class="text-gray-300 text-xs">Click the chat bubble →</p>
  </div>

  <!-- Floating widget container -->
  <div id="widget" style="position:fixed;bottom:24px;right:24px;z-index:1000;">

    <!-- Chat panel (hidden by default) -->
    <div id="chat-panel" style="display:none;width:360px;height:480px;" class="bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col overflow-hidden mb-3">

      <!-- Header -->
      <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-green-400"></div>
          <span class="font-semibold text-gray-800 text-sm">Chat with me</span>
        </div>
        <button onclick="toggleWidget()" class="text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>
      </div>

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3"></div>

      <!-- Capture form -->
      <div id="capture-form" class="hidden px-4 py-3 border-t border-gray-100 bg-gray-50">
        <p class="text-sm text-gray-500 mb-2">To continue, drop your details below:</p>
        <input id="capture-name" type="text" placeholder="Your name" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <input id="capture-email" type="email" placeholder="Your email" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <button onclick="submitCapture()" class="w-full bg-indigo-600 text-white text-sm rounded-lg py-2 hover:bg-indigo-700 transition">Send</button>
      </div>

      <!-- Input -->
      <div id="input-area" class="px-4 py-3 border-t border-gray-100 flex gap-2">
        <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" onkeydown="if(event.key==='Enter')sendMessage()" />
        <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition">→</button>
      </div>
    </div>

    <!-- Toggle button -->
    <button onclick="toggleWidget()" id="toggle-btn" class="w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg flex items-center justify-center text-2xl transition ml-auto block">
      💬
    </button>
  </div>

  <script>
    let sessionId = null;
    let detectedProduct = 'other';

    function toggleWidget() {
      const panel = document.getElementById('chat-panel');
      const isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'flex';
    }

    function addMessage(role, text) {
      const container = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = `max-w-xs px-4 py-2 rounded-2xl text-sm ${role === 'user' ? 'bg-indigo-600 text-white rounded-br-sm' : 'bg-gray-100 text-gray-800 rounded-bl-sm'}`;
      bubble.textContent = text;
      row.appendChild(bubble);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    function addLoader() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.id = 'loader';
      div.className = 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = 'bg-gray-100 text-gray-400 px-4 py-2 rounded-2xl text-sm rounded-bl-sm';
      bubble.textContent = '...';
      div.appendChild(bubble);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeLoader() {
      const loader = document.getElementById('loader');
      if (loader) loader.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const btn = input.nextElementSibling;
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      input.disabled = true;
      btn.disabled = true;
      addMessage('user', message);
      addLoader();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message })
        });
        const data = await res.json();
        removeLoader();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        sessionId = data.sessionId;
        if (data.product) detectedProduct = data.product;
        addMessage('assistant', data.reply);
        if (data.captureReady) {
          document.getElementById('input-area').classList.add('hidden');
          document.getElementById('capture-form').classList.remove('hidden');
        }
      } catch (err) {
        removeLoader();
        addMessage('assistant', 'Something went wrong. Please try again.');
      } finally {
        input.disabled = false;
        btn.disabled = false;
        input.focus();
      }
    }

    async function submitCapture() {
      const name = document.getElementById('capture-name').value.trim();
      const email = document.getElementById('capture-email').value.trim();
      if (!name || !email) return alert('Please fill in both fields.');

      const captureDiv = document.getElementById('capture-form');
      captureDiv.innerHTML = '<p class="text-sm text-gray-400 text-center py-2">Analysing your information...</p>';

      try {
        const res = await fetch('/api/leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, name, email, product: detectedProduct })
        });
        if (!res.ok) throw new Error('Submission failed');
        captureDiv.innerHTML = '<p class="text-sm text-indigo-600 text-center py-2 font-medium">Thanks! I\'ll be in touch soon.</p>';
      } catch (err) {
        captureDiv.innerHTML = '<p class="text-sm text-red-500 text-center py-2">Something went wrong. Please refresh and try again.</p>';
      }
    }

    // Auto-greet on page load
    window.onload = () => {
      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: null, message: 'Hello' })
      }).then(r => r.json()).then(data => {
        sessionId = data.sessionId;
        addMessage('assistant', data.reply);
      }).catch(() => {});
    };
  </script>
</body>
</html>
