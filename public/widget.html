<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Visual Pro — Chat Widget Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes dvp-ping {
      0%   { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(0, 123, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
    }
    #toggle-btn {
      animation: dvp-ping 2.4s ease-out 1.2s 3;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex items-center justify-center">

  <!-- Demo background -->
  <div class="text-center">
    <p class="text-gray-400 text-sm mb-2">This widget can be embedded on any website</p>
    <p class="text-gray-300 text-xs">Click the chat bubble to get started</p>
  </div>

  <!-- Floating widget container -->
  <div id="widget" style="position:fixed;bottom:24px;right:24px;z-index:1000;">

    <!-- Chat panel (hidden by default) -->
    <div id="chat-panel" style="display:none;width:360px;height:480px;" class="bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col overflow-hidden mb-3">

      <!-- Header -->
      <div style="background:#007bff;" class="px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-white opacity-80"></div>
          <span class="font-semibold text-white text-sm">3D Visual Pro</span>
        </div>
        <button onclick="toggleWidget()" class="text-white opacity-70 hover:opacity-100 text-lg leading-none">&#x2715;</button>
      </div>

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3"></div>

      <!-- Capture form -->
      <div id="capture-form" class="hidden px-4 py-3 border-t border-gray-100 bg-gray-50">
        <p class="text-sm text-gray-500 mb-2">To continue, drop your details below:</p>
        <input id="capture-name" type="text" placeholder="Your name"
          style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:8px;" />
        <input id="capture-email" type="email" placeholder="Your email"
          style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:8px;" />
        <input type="tel" id="capturePhone" placeholder="Phone with country code (optional)"
          style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:8px;" />
        <button onclick="submitCapture()" style="background:#007bff;" class="w-full text-white text-sm rounded-lg py-2 hover:opacity-90 transition">Send</button>
      </div>

      <!-- Input -->
      <div id="input-area" class="px-4 py-3 border-t border-gray-100 flex gap-2">
        <input id="msg-input" type="text" placeholder="Type a message..."
          class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none"
          style="focus-ring-color:#007bff;"
          onkeydown="if(event.key==='Enter')sendMessage()" />
        <button onclick="sendMessage()" style="background:#007bff;" class="text-white px-4 py-2 rounded-lg text-sm hover:opacity-90 transition">&#x2192;</button>
      </div>
    </div>

    <!-- Toggle button -->
    <button onclick="toggleWidget()" id="toggle-btn"
      style="background:#007bff;"
      class="w-14 h-14 hover:opacity-90 text-white rounded-full shadow-lg flex items-center justify-center text-2xl transition ml-auto block">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
  </div>

  <script>
    const API_BASE = (window.DVP_CHAT_CONFIG && window.DVP_CHAT_CONFIG.apiBase) || '';

    let sessionId = null;
    let detectedProduct = 'other';

    function toggleWidget() {
      const panel = document.getElementById('chat-panel');
      const isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'flex';
    }

    function addMessage(role, text) {
      const container = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
      const bubble = document.createElement('div');
      if (role === 'user') {
        bubble.style.background = '#007bff';
        bubble.style.color = '#fff';
        bubble.className = 'max-w-xs px-4 py-2 rounded-2xl text-sm rounded-br-sm';
      } else {
        bubble.className = 'max-w-xs px-4 py-2 rounded-2xl text-sm bg-gray-100 text-gray-800 rounded-bl-sm';
      }
      bubble.textContent = text;
      row.appendChild(bubble);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    function addLoader() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.id = 'loader';
      div.className = 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = 'bg-gray-100 text-gray-400 px-4 py-2 rounded-2xl text-sm rounded-bl-sm';
      bubble.textContent = '...';
      div.appendChild(bubble);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeLoader() {
      const loader = document.getElementById('loader');
      if (loader) loader.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const btn = input.nextElementSibling;
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      input.disabled = true;
      btn.disabled = true;
      addMessage('user', message);
      addLoader();

      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message })
        });
        const data = await res.json();
        removeLoader();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        sessionId = data.sessionId;
        if (data.product) detectedProduct = data.product;
        addMessage('assistant', data.reply);
        if (data.captureReady) {
          document.getElementById('input-area').classList.add('hidden');
          document.getElementById('capture-form').classList.remove('hidden');
        }
      } catch (err) {
        removeLoader();
        addMessage('assistant', 'Something went wrong. Please try again.');
      } finally {
        input.disabled = false;
        btn.disabled = false;
        input.focus();
      }
    }

    async function submitCapture() {
      const name = document.getElementById('capture-name').value.trim();
      const email = document.getElementById('capture-email').value.trim();
      const phone = document.getElementById('capturePhone').value.trim();
      if (!name || !email) return alert('Please fill in your name and email.');

      const captureDiv = document.getElementById('capture-form');
      captureDiv.innerHTML = '<p class="text-sm text-gray-400 text-center py-2">Analysing your information...</p>';

      try {
        const res = await fetch(`${API_BASE}/api/leads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, name, email, phone: phone || undefined, product: detectedProduct || 'other' })
        });
        if (!res.ok) throw new Error('Submission failed');
        captureDiv.innerHTML = '<p class="text-sm text-center py-2 font-medium" style="color:#007bff;">Thanks! We\'ll be in touch soon.</p>';
      } catch (err) {
        captureDiv.innerHTML = '<p class="text-sm text-red-500 text-center py-2">Something went wrong. Please refresh and try again.</p>';
      }
    }

    // Auto-greet on page load
    window.onload = () => {
      fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: null, message: 'Hello' })
      }).then(r => r.json()).then(data => {
        sessionId = data.sessionId;
        addMessage('assistant', data.reply);
      }).catch(() => {});
    };
  </script>
</body>
</html>
